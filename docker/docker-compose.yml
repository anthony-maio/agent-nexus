services:
  nexus-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.bot
    container_name: nexus-api
    restart: unless-stopped
    env_file:
      - path: ../config/.env
        required: false
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - ../config:/app/config
      - ../data:/app/data
      - ../workspace:/app/workspace
    command: ["python", "-m", "nexus_api"]
    networks:
      - nexus-net
    depends_on:
      - nexus-postgres
      - nexus-sandbox-runner
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/health\")'"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  nexus-sandbox-runner:
    build:
      context: ..
      dockerfile: docker/Dockerfile.sandbox
    container_name: nexus-sandbox-runner
    restart: unless-stopped
    env_file:
      - path: ../config/.env
        required: false
    environment:
      SANDBOX_EXECUTION_BACKEND: "${SANDBOX_EXECUTION_BACKEND:-local}"
      SANDBOX_DOCKER_IMAGE: "${SANDBOX_DOCKER_IMAGE:-python:3.13-slim}"
      SANDBOX_DOCKER_BIN: "${SANDBOX_DOCKER_BIN:-docker}"
      SANDBOX_DOCKER_HOST: "${SANDBOX_DOCKER_HOST:-tcp://nexus-sandbox-dind:2375}"
      SANDBOX_DOCKER_NETWORK: "${SANDBOX_DOCKER_NETWORK:-none}"
      SANDBOX_DOCKER_MEMORY: "${SANDBOX_DOCKER_MEMORY:-512m}"
      SANDBOX_DOCKER_CPUS: "${SANDBOX_DOCKER_CPUS:-1.0}"
      SANDBOX_DOCKER_PIDS: "${SANDBOX_DOCKER_PIDS:-128}"
      SANDBOX_STEP_TIMEOUT_SEC: "${SANDBOX_STEP_TIMEOUT_SEC:-120}"
    ports:
      - "${SANDBOX_PORT:-8020}:8020"
    volumes:
      - ../data:/app/data
    command: ["python", "-m", "nexus_sandbox_runner"]
    networks:
      - nexus-net
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8020/health\")'"]
      interval: 30s
      timeout: 10s
      retries: 3

  nexus-sandbox-dind:
    image: docker:27-dind
    container_name: nexus-sandbox-dind
    restart: unless-stopped
    profiles: [sandbox-docker]
    privileged: true
    environment:
      DOCKER_TLS_CERTDIR: ""
    command: ["--host=tcp://0.0.0.0:2375", "--tls=false"]
    volumes:
      - sandbox_dind_data:/var/lib/docker
    networks:
      - nexus-net
    healthcheck:
      test: ["CMD-SHELL", "docker info >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  nexus-discord-bridge:
    build:
      context: ..
      dockerfile: docker/Dockerfile.bot
    container_name: nexus-discord-bridge
    restart: unless-stopped
    profiles: [discord-bridge]
    env_file:
      - path: ../config/.env
        required: false
    environment:
      APP_API_URL: "http://nexus-api:8000"
    command: ["python", "-m", "nexus_discord_bridge"]
    networks:
      - nexus-net
    depends_on:
      - nexus-api

  nexus-bot:
    build:
      context: ..
      dockerfile: docker/Dockerfile.bot
    container_name: nexus-bot
    restart: unless-stopped
    profiles: [discord-bot]
    env_file:
      - path: ../config/.env
        required: false
    ports:
      - "${SETUP_PORT:-8090}:8090"
    volumes:
      - ../config:/app/config
      - ../data:/app/data
    networks:
      - nexus-net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import sys; sys.exit(0)'"]
      interval: 30s
      timeout: 10s
      retries: 3

  nexus-qdrant:
    image: qdrant/qdrant:latest
    container_name: nexus-qdrant
    restart: unless-stopped
    profiles: [qdrant]
    ports:
      - "127.0.0.1:${QDRANT_PORT:-6333}:6333"
      - "127.0.0.1:${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - nexus-net

  nexus-redis:
    image: redis:7-alpine
    container_name: nexus-redis
    restart: unless-stopped
    profiles: [redis]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - nexus-net

  nexus-neo4j:
    image: neo4j:5-community
    container_name: nexus-neo4j
    restart: unless-stopped
    profiles: [neo4j]
    environment:
      NEO4J_AUTH: neo4j/nexus-c2-graph
    ports:
      - "127.0.0.1:${NEO4J_BOLT_PORT:-7687}:7687"
      - "127.0.0.1:${NEO4J_HTTP_PORT:-7474}:7474"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - nexus-net
    deploy:
      resources:
        limits:
          memory: 512M

  nexus-postgres:
    image: postgres:16-alpine
    container_name: nexus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: nexus
      POSTGRES_DB: nexus
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus -d nexus"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - nexus-net

volumes:
  qdrant_data:
  redis_data:
  neo4j_data:
  postgres_data:
  sandbox_dind_data:

networks:
  nexus-net:
    driver: bridge
