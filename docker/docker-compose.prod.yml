services:
  nexus-api:
    ports:
      - "127.0.0.1:${APP_PORT:-8000}:8000"

  nexus-sandbox-runner:
    ports:
      - "127.0.0.1:${SANDBOX_PORT:-8020}:8020"

  nexus-frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: nexus-frontend
    restart: unless-stopped
    networks:
      - nexus-net
    depends_on:
      - nexus-api

  nexus-proxy:
    image: caddy:2.8-alpine
    container_name: nexus-proxy
    restart: unless-stopped
    environment:
      NEXUS_PUBLIC_HOST: "${NEXUS_PUBLIC_HOST:-localhost}"
      ACME_EMAIL: "${ACME_EMAIL:-}"
    ports:
      - "${NEXUS_HTTP_PORT:-80}:80"
      - "${NEXUS_HTTPS_PORT:-443}:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - nexus-net
    depends_on:
      - nexus-frontend
      - nexus-api

volumes:
  caddy_data:
  caddy_config:
