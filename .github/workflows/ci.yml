name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Install backend dependencies
        run: |
          uv venv
          uv pip install -e ".[dev]"

      - name: Lint app-first Python scope
        run: >
          uv run ruff check
          src/nexus_api
          src/nexus_core
          src/nexus_discord_bridge
          src/nexus_sandbox_runner
          tests/test_nexus_api_app.py
          tests/test_nexus_api_bootstrap.py
          tests/test_sandbox_executors.py
          tests/test_discord_bridge.py
          tests/test_nexus_core_adapters.py

      - name: Lint touched Python files (PR baseline)
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin "${{ github.base_ref }}" --depth=1
          bash scripts/lint-touched.sh "origin/${{ github.base_ref }}"

      - name: Run backend tests
        run: uv run pytest -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm test

      - name: Build frontend
        run: npm run build
